# Dependabot — automated dependency update PRs.
# Covers every Python requirements file, the UI npm project, and the GitHub Actions.
# NOTE: lab/vulnerable_app is intentionally vulnerable and is deliberately excluded.
version: 2
updates:
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
  - package-ecosystem: pip
    directory: "/server"
    schedule:
      interval: weekly
  - package-ecosystem: pip
    directory: "/agent"
    schedule:
      interval: weekly
  - package-ecosystem: pip
    directory: "/scanner"
    schedule:
      interval: weekly
  - package-ecosystem: pip
    directory: "/ml"
    schedule:
      interval: weekly
  - package-ecosystem: npm
    directory: "/ui"
    schedule:
      interval: weekly
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
