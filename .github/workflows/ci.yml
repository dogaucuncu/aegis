name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            requirements-dev.txt
            **/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt -e crypto

      - name: Lint (ruff)
        run: ruff check .

      - name: Dependency audit (pip-audit)
        # Advisory-only for now (does not block): surfaces known CVEs in dependencies.
        # Flip continue-on-error to false to make vulnerable deps fail the build.
        continue-on-error: true
        run: |
          pip install pip-audit
          pip-audit --desc \
            -r requirements-dev.txt \
            -r server/requirements.txt \
            -r agent/requirements.txt \
            -r scanner/requirements.txt \
            -r ml/requirements.txt

      - name: Tests (pytest)
        run: pytest -q

      - name: ML train smoke
        working-directory: ml
        run: python -m aegis_ml.train
