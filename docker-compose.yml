# Aegis — containerized run (Phase 5).
# NOTE: This configuration has not been live-tested since Docker is not available on the dev machine.
#   docker compose up --build
services:
  db:
    image: postgres:18
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: aegis
    ports:
      - "5432:5432"

  soc:
    build:
      context: .
      dockerfile: server/Dockerfile
    environment:
      AEGIS_DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/aegis
    ports:
      - "8000:8000"
    depends_on:
      - db

  ml:
    build:
      context: .
      dockerfile: ml/Dockerfile
    ports:
      - "8001:8001"
