<svg viewBox="0 0 780 560" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="ttl desc" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif">
  <title id="ttl">Aegis mini-SOC mimarisi</title>
  <desc id="desc">Ajan, zafiyet tarayıcı ve ML motoru, güvenli bir kanaldan (mTLS, AES-GCM, Ed25519) Aegis SOC sunucusuna veri gönderir; sunucu kural motoru ve hash-zinciri ile işleyip veri deposuna yazar ve React dashboard'da gösterir.</desc>
  <rect x="0" y="0" width="780" height="560" fill="#0b1220"/>
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <text x="40" y="30" font-size="19" font-weight="700" fill="#e2e8f0">Aegis — Mini SOC Mimarisi</text>

  <g font-size="12" fill="#cbd5e1">
    <rect x="40" y="44" width="11" height="11" rx="3" fill="#38bdf8"/><text x="57" y="54">Defansif (Blue)</text>
    <rect x="178" y="44" width="11" height="11" rx="3" fill="#fb7185"/><text x="195" y="54">Ofansif (Red)</text>
    <rect x="300" y="44" width="11" height="11" rx="3" fill="#a78bfa"/><text x="317" y="54">ML</text>
    <rect x="360" y="44" width="11" height="11" rx="3" fill="#fbbf24"/><text x="377" y="54">Kriptografi</text>
  </g>

  <g>
    <rect x="40" y="80" width="200" height="66" rx="10" fill="#0f1b2e" stroke="#38bdf8"/>
    <rect x="40" y="80" width="200" height="4" rx="2" fill="#38bdf8"/>
    <text x="56" y="108" font-size="14" font-weight="600" fill="#e2e8f0">Uç Nokta Ajanı</text>
    <text x="56" y="127" font-size="11.5" fill="#94a3b8">telemetri toplama (psutil)</text>
  </g>
  <g>
    <rect x="290" y="80" width="200" height="66" rx="10" fill="#0f1b2e" stroke="#fb7185"/>
    <rect x="290" y="80" width="200" height="4" rx="2" fill="#fb7185"/>
    <text x="306" y="108" font-size="14" font-weight="600" fill="#e2e8f0">Zafiyet Tarayıcı</text>
    <text x="306" y="127" font-size="11.5" fill="#94a3b8">port + web (SQLi/XSS)</text>
  </g>
  <g>
    <rect x="540" y="80" width="200" height="66" rx="10" fill="#0f1b2e" stroke="#a78bfa"/>
    <rect x="540" y="80" width="200" height="4" rx="2" fill="#a78bfa"/>
    <text x="556" y="108" font-size="14" font-weight="600" fill="#e2e8f0">ML Motoru</text>
    <text x="556" y="127" font-size="11.5" fill="#94a3b8">anomali + phishing</text>
  </g>

  <g stroke="#94a3b8" stroke-width="1.5">
    <line x1="140" y1="146" x2="140" y2="178" marker-end="url(#ah)"/>
    <line x1="390" y1="146" x2="390" y2="178" marker-end="url(#ah)"/>
    <line x1="640" y1="146" x2="640" y2="178" marker-end="url(#ah)"/>
  </g>

  <rect x="40" y="182" width="700" height="34" rx="8" fill="#2a230c" stroke="#fbbf24"/>
  <text x="390" y="204" font-size="13" font-weight="600" text-anchor="middle" fill="#fde68a">🔒 Güvenli kanal — mTLS · AES-GCM · Ed25519 imza</text>

  <line x1="390" y1="216" x2="390" y2="250" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#ah)"/>

  <rect x="140" y="252" width="500" height="96" rx="12" fill="#101a2b" stroke="#475569"/>
  <text x="160" y="278" font-size="15" font-weight="700" fill="#e2e8f0">Aegis SOC Sunucusu</text>
  <text x="305" y="278" font-size="11.5" fill="#94a3b8">· FastAPI</text>
  <g font-size="12" fill="#e2e8f0">
    <rect x="160" y="296" width="140" height="34" rx="8" fill="#1b2740"/>
    <text x="230" y="318" text-anchor="middle">Ingest API</text>
    <rect x="320" y="296" width="140" height="34" rx="8" fill="#1b2740"/>
    <text x="390" y="318" text-anchor="middle">Kural Motoru</text>
    <rect x="480" y="296" width="140" height="34" rx="8" fill="#1b2740"/>
    <text x="550" y="318" text-anchor="middle">Hash-zinciri</text>
  </g>

  <line x1="390" y1="348" x2="390" y2="384" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#ah)"/>

  <rect x="250" y="386" width="280" height="56" rx="10" fill="#0f1b2e" stroke="#475569"/>
  <text x="390" y="411" font-size="14" font-weight="600" text-anchor="middle" fill="#e2e8f0">Veri Deposu</text>
  <text x="390" y="429" font-size="11.5" text-anchor="middle" fill="#94a3b8">PostgreSQL / SQLite</text>

  <line x1="390" y1="442" x2="390" y2="478" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#ah)"/>

  <rect x="225" y="480" width="330" height="58" rx="10" fill="#0f1b2e" stroke="#38bdf8"/>
  <text x="390" y="505" font-size="14" font-weight="600" text-anchor="middle" fill="#e2e8f0">React Dashboard</text>
  <text x="390" y="523" font-size="11.5" text-anchor="middle" fill="#94a3b8">canlı alarm akışı · bütünlük rozeti</text>
</svg>
